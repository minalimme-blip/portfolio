<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Image — Mina Lim Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    background: #0a0a0a;
    color: #fafaf7;
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
  }
  .card {
    width: 1200px;
    height: 630px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding: 56px 80px;
    background:
      radial-gradient(circle at 80% 20%, rgba(255, 217, 46, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 20% 80%, rgba(255, 128, 37, 0.06) 0%, transparent 50%),
      #0a0a0a;
  }
  /* corner brackets */
  .card::before, .card::after {
    content: "";
    position: absolute;
    width: 28px;
    height: 28px;
    border: 1px solid rgba(255, 217, 46, 0.5);
  }
  .card::before {
    top: 32px;
    left: 32px;
    border-right: none;
    border-bottom: none;
  }
  .card::after {
    bottom: 32px;
    right: 32px;
    border-left: none;
    border-top: none;
  }

  .top-bar, .bottom-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    letter-spacing: 0.18em;
    color: #888;
    text-transform: uppercase;
    font-weight: 500;
  }
  .top-bar .left, .bottom-bar .left { color: #ff8025; }
  .top-bar .right, .bottom-bar .right { color: #888; }

  .hero {
    text-align: center;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 100%;
  }
  .hero .eyebrow {
    font-size: 14px;
    letter-spacing: 0.32em;
    color: #ffd92e;
    text-transform: uppercase;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .hero .eyebrow .line {
    width: 32px;
    height: 1px;
    background: #ffd92e;
  }
  .name {
    font-family: 'DM Serif Display', serif;
    font-weight: 400;
    font-size: 240px;
    line-height: 0.92;
    letter-spacing: -0.02em;
    color: #fafaf7;
    text-align: center;
  }
  .name em {
    font-style: italic;
    color: #ffd92e;
    margin-left: 8px;
  }
  .tagline {
    margin-top: 32px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    letter-spacing: 0.18em;
    color: #aaa;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .tagline .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #ff8025;
  }
</style>
</head>
<body>
<div class="card">
  <div class="top-bar">
    <span class="left">◉ Portfolio · Vol. 1 · 2026</span>
    <span class="right"></span>
  </div>

  <div class="hero">
    <div class="eyebrow">
      <span class="line"></span>
      Product Marketing
      <span class="line"></span>
    </div>
    <div class="name">Mina <em>Lim</em></div>
    <div class="tagline">
      <span>Industrial B2B</span>
      <span class="dot"></span>
      <span>Capital Equipment</span>
      <span class="dot"></span>
      <span>Tampere, FI</span>
    </div>
  </div>

  <div class="bottom-bar">
    <span class="left"></span>
    <span class="right">↗ View portfolio</span>
  </div>
</div>
</body>
</html>
