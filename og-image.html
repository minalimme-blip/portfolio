<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Image — Mina Lim Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    background: #0a0a0a;
    color: #fff;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }
  .card {
    width: 1200px;
    height: 630px;
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    position: relative;
  }
  .left {
    padding: 60px 56px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: #0a0a0a;
    z-index: 2;
  }
  .top-row {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.06em;
    color: #ff8025;
    text-transform: uppercase;
  }
  .top-row .star { color: #ffd92e; }
  .name {
    font-family: 'DM Serif Display', serif;
    font-weight: 400;
    font-size: 96px;
    line-height: 0.95;
    letter-spacing: -0.02em;
    margin-top: 12px;
  }
  .name em {
    font-style: italic;
    color: #ffd92e;
  }
  .role {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: #d4d4d4;
    margin-top: 16px;
    line-height: 1.3;
  }
  .role span { color: #ff8025; }
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 20px;
    margin-top: 24px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat .num {
    font-weight: 800;
    font-size: 28px;
    background: linear-gradient(135deg, #ffd92e, #ff8025);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .stat .lbl {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    line-height: 1.3;
  }
  .footer {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #666;
    margin-top: 12px;
  }
  .footer .dot { width: 6px; height: 6px; border-radius: 50%; background: #ffd92e; }

  .right {
    position: relative;
    overflow: hidden;
  }
  .right .photo {
    position: absolute;
    inset: 0;
    background-image: url('images/profile.jpg');
    background-size: cover;
    background-position: 35% center;
  }
  .right .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.45) 18%, rgba(10,10,10,0) 50%);
  }
  .right .accent {
    position: absolute;
    bottom: 32px;
    right: 32px;
    background: #ffd92e;
    color: #0a0a0a;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 999px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="card">
  <div class="left">
    <div>
      <div class="top-row">
        <span>PORTFOLIO</span>
        <span class="star">✦</span>
        <span>INDUSTRIAL B2B</span>
      </div>
      <div class="name">Mina <em>Lim</em></div>
      <div class="role">Product Marketing for<br>technical <span>capital equipment</span></div>
    </div>
    <div>
      <div class="stats">
        <div class="stat">
          <div class="num">158+</div>
          <div class="lbl">Leads · ARA + BAUMA '25</div>
        </div>
        <div class="stat">
          <div class="num">−49%</div>
          <div class="lbl">CPC · U.S. expansion</div>
        </div>
        <div class="stat">
          <div class="num">+200%</div>
          <div class="lbl">YoY pipeline · U.S.</div>
        </div>
        <div class="stat">
          <div class="num">10+</div>
          <div class="lbl">Markets · distributor reach</div>
        </div>
      </div>
      <div class="footer">
        <span class="dot"></span>
        <span>Tampere, Finland · Dinolift Oy</span>
      </div>
    </div>
  </div>
  <div class="right">
    <div class="photo"></div>
    <div class="overlay"></div>
    <div class="accent">↗ View portfolio</div>
  </div>
</div>
</body>
</html>
